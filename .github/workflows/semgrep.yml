name: Semgrep SAST

# Semgrep complements CodeQL: the registry packs (security-audit, secrets) plus
# a custom store-invariant ruleset (.semgrep/stash.yml) that encodes the
# SPEC.md 13.1 forbidden-capability surface. Scoped to the shipped product
# (src/); findings upload to the Security tab like CodeQL (non-blocking, so a
# registry-rule false positive never wedges the merge gate). The hard gate for
# SPEC.md 13.1 invariant 1 stays in ci.yml; this scan is the Security-tab
# mirror with pattern-level precision.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 5 * * 1"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep (registry + store invariant rules)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read          # required for SARIF upload on private/GHAS repos
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Semgrep
        # Hash-pinned install: every artifact in the tree is fixed by SHA-256 under
        # --require-hashes, so a compromised or yanked wheel cannot substitute. The
        # analysis rules are fetched from the registry at scan time, so pinning the
        # engine version does not freeze the ruleset. The lockfile is named
        # semgrep-pins.txt (NOT *requirements.txt) so the dependency graph does not
        # mistake these pinned CI-tool wheels for shipped project dependencies --
        # the package itself has zero npm dependencies, dev included.
        # Regenerate it with:
        #   docker run --rm -v "$PWD/.github:/w" -w /w python:3.12-slim sh -c \
        #     'pip install pip-tools && pip-compile --generate-hashes \
        #      --resolver=backtracking -o semgrep-pins.txt semgrep-pins.in'
        run: python -m pip install --require-hashes -r .github/semgrep-pins.txt

      - name: Scan (registry packs + store invariant rules)
        run: |
          set +e
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config .semgrep/stash.yml \
            --sarif --output semgrep.sarif \
            --metrics off \
            src
          code=$?
          set -e
          # Exit 0 (clean) and 1 (findings) are fine -- findings are non-blocking and
          # go to the Security tab. Exit >= 2 is a fatal/config error (unfetchable
          # registry pack, invalid rule, unparseable .semgrep/*.yml, missing config):
          # fail loudly instead of silently disabling the scan.
          if [ "$code" -ge 2 ]; then
            echo "::error::Semgrep exited $code (config/infrastructure error, not findings) -- the scan did not run."
            exit "$code"
          fi

      - name: Upload SARIF to the Security tab
        # Only when the scan produced a SARIF -- a Semgrep failure leaves no file
        # and upload-sarif errors on an absent path (reddens a non-blocking job).
        # Non-blocking: a fork PR or a Dependabot PR runs with a read-only
        # GITHUB_TOKEN (GitHub downgrades the requested security-events: write), so
        # the upload fails a permission check even though the scan succeeded --
        # continue-on-error keeps the check green and tied to real findings, not to
        # who opened the PR. The scan itself still gates on a config error above.
        if: ${{ hashFiles('semgrep.sarif') != '' }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        with:
          sarif_file: semgrep.sarif
          category: semgrep
