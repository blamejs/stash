# Publish @blamejs/stash to the npm registry on every `v*` tag push, AND
# create the GitHub release with the asset bundle.
#
# The workflow is authoritative for release creation -- the operator
# pushes the tag and the workflow:
#   1. Validates (version/tag match + the full ci.yml gate battery + SBOM)
#   2. Packs the tarball (the exact bytes that will be published)
#   3. Extracts release notes from the CHANGELOG.md entry for this version
#   4. Creates the GitHub release ATOMICALLY with the asset bundle:
#        - blamejs-stash-X.Y.Z.tgz  (+ .sha256 sidecar)
#        - sbom.cdx.json
#   5. Publishes to npm with --provenance attached.
#
# Supply-chain posture:
#   - npm publish --provenance attaches a SLSA provenance attestation
#     tying the published tarball to this workflow run + commit + tag.
#   - Version match: package.json "version" MUST equal the pushed tag
#     minus the leading "v". Tag drift fails the publish.
#   - The publish job re-hashes the downloaded artifacts against the
#     sha256 subjects the validate job computed, so bytes that mutate in
#     the artifact store between jobs fail the publish.
#   - Deferred until the release tooling lands: a standalone SLSA L3
#     *.intoto.jsonl attestation (slsa-github-generator) attached to the
#     release, a cosign-keyless signature over the SBOM, and an in-workflow
#     slsa-verifier check of the attestation against the assets. Those
#     steps activate together with the scripted release pipeline; until
#     then npm's own --provenance is the attestation surface.
#
# `workflow_dispatch.dry_run` exercises validate (gates + pack) without
# release-creation or npm publish. A publishing dispatch (dry_run=false)
# must target the version's pushed tag ref -- the npm-publish environment
# deploys tag refs only, so a branch-ref dispatch would be rejected at the
# environment gate; validate refuses it up front with the working command:
#   gh workflow run 'npm publish' --ref vX.Y.Z -f dry_run=false

name: npm publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run gates + pack without publishing to npm or creating the release'
        type: boolean
        default: true

# Workflow-level is read-only; downstream jobs elevate as needed
# (contents:write for the release, id-token:write for npm provenance).
permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Gates, suite, SBOM, pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag:  ${{ steps.version.outputs.is_tag }}
      hashes:  ${{ steps.subjects.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node 24.18.0 LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'

      - name: Compute version + is_tag flag
        id: version
        # is_tag reports whether the run built a v* tag ref, whatever event
        # started it -- a dispatch on the tag ref counts, so the version/tag
        # match check and the summary cover both paths. A publishing
        # dispatch on a branch ref is refused here, in the earliest step:
        # the npm-publish environment deploys tag refs only, and without
        # this check the run passes every gate and then dies at the
        # environment gate with only a protection-rules annotation.
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('./package.json', 'utf8')).version")
          if ! printf '%s\n' "$PKG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::package.json version ($PKG_VERSION) is not X.Y.Z -- the release grammar admits no other shape."
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG_VERSION="${REF#refs/tags/v}"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::package.json version ($PKG_VERSION) does not match the built tag (v$TAG_VERSION)"
              exit 1
            fi
            echo "package.json version $PKG_VERSION matches tag v$TAG_VERSION"
          else
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN" = "false" ]; then
              echo "::error::A publishing dispatch must run on the version's pushed tag ref, not a branch:"
              echo "::error::the npm-publish environment deploys tag refs only, so this run would be"
              echo "::error::rejected at the environment gate after every gate passes."
              echo "::error::Re-run as: gh workflow run 'npm publish' --ref v${PKG_VERSION} -f dry_run=false"
              exit 1
            fi
          fi

      # Zero dependencies, dev included: there is no npm install anywhere in
      # this pipeline -- the lockfile step below is a read-only dry run. The
      # tag-push publish path is independent of the pull_request CI, so the
      # full ci.yml gate battery re-runs here before `npm pack` -- a tree
      # that fails any of these must never be packed into the published
      # tarball.
      - name: Codebase patterns
        run: node test/codebase-patterns.test.js

      - name: Source comment blocks
        run: node scripts/validate-source-comment-blocks.js

      - name: API snapshot
        run: node scripts/check-api-snapshot.js

      - name: Status lifecycle
        run: node scripts/check-status-lifecycle.js

      - name: Changelog regen check
        run: node scripts/regen-changelog.js --check

      - name: README error-code table check
        run: node scripts/regen-readme.js --check

      - name: Pack gate
        run: node scripts/check-pack-against-gitignore.js

      - name: Lockfile sync (package-lock.json matches package.json)
        # The committed lockfile describes exactly the root package -- zero
        # dependencies in any scope. `npm ci --dry-run` re-validates the
        # dependency graph against package.json without downloading or
        # writing anything; the root name/version are compared explicitly
        # because `npm ci` does not assert them. A drifted lockfile fails
        # here instead of feeding a stale version into the SBOM below.
        run: |
          set -euo pipefail
          node -e "
            const { readFileSync } = require('node:fs');
            const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
            const lock = JSON.parse(readFileSync('package-lock.json', 'utf8'));
            const root = (lock.packages || {})[''] || {};
            const fail = (msg) => { console.error('::error::' + msg); process.exit(1); };
            if (lock.name !== pkg.name || root.name !== pkg.name) fail('package-lock.json name does not match package.json -- regenerate with: npm install --package-lock-only');
            if (lock.version !== pkg.version || root.version !== pkg.version) fail('package-lock.json version (' + lock.version + ') does not match package.json (' + pkg.version + ') -- regenerate with: npm install --package-lock-only');
          "
          npm ci --dry-run --ignore-scripts --no-audit --no-fund

      - name: Suite
        # --expose-gc: the guard-reclamation-on-GC vector forces a collection to prove a
        # dropped Stash's stale claim guard is reaped.
        run: node --expose-gc --test

      - name: Suite under --permission (SPEC.md 13.1 invariant 2)
        run: node scripts/run-sandboxed.js

      - name: Forbidden-token invariant (SPEC.md 13.1 invariant 1)
        run: |
          set -e
          if grep -rnE "createCipheriv|createDecipheriv|node:sqlite" src/; then exit 1; fi
          if grep -rniE "password" src/; then exit 1; fi

      - name: Wiki e2e
        run: node examples/wiki/test/e2e.js

      - name: Runnable examples
        run: node scripts/run-examples.js

      - name: Generate CycloneDX SBOM (npm-tree)
        # `npm sbom` is built in to npm 10+ and reads the committed
        # package-lock.json (validated against package.json by the lockfile
        # sync step above) -- nothing is downloaded, nothing is installed.
        # The guard below refuses the publish if any dependency component
        # appears: the zero-dependency contract (SPEC.md section 2) says the
        # SBOM lists exactly one component, the package itself.
        run: |
          set -euo pipefail
          npm sbom --sbom-format=cyclonedx --sbom-type=application --omit=dev > sbom.cdx.json
          DEP_COUNT=$(node -e "
            const s = JSON.parse(require('node:fs').readFileSync('sbom.cdx.json', 'utf8'));
            const comps = (s.components || []).filter((c) =>
              c.scope !== 'optional' && c.scope !== 'excluded' &&
              c['bom-ref'] !== s.metadata.component['bom-ref']);
            console.log(comps.length);
          ")
          if [ "$DEP_COUNT" -gt 0 ]; then
            echo "::error::SBOM lists $DEP_COUNT dependency component(s)."
            echo "::error::@blamejs/stash ships zero dependencies, dev included (SPEC.md section 2)."
            exit 1
          fi

      # A vulnerability scan of the dependency tree (OSV) is intentionally
      # absent: the lockfile records zero dependencies in any scope, so the
      # scanner has an empty target set. If a dependency or vendored bundle
      # ever lands, add an OSV-Scanner step here in the same change.

      - name: Pack tarball (the exact bytes that will be published)
        # Reproducible build: `npm pack` stamps a fixed, hardcoded mtime
        # into every tar header (pacote's tar-create-options pins it to
        # 1985-10-26T08:15:00Z), so re-packing the same commit is
        # byte-identical and an operator can rebuild the tarball from
        # source and match the published sha256.
        run: |
          set -euo pipefail
          mkdir -p dist
          npm pack --pack-destination ./dist
          ls -lh dist/

      - name: Compute subject hashes (sha256 of every release artifact)
        # The publish job re-derives these from the downloaded artifacts and
        # requires byte-identical output before anything is published.
        id: subjects
        run: |
          set -euo pipefail
          TARBALL=$(basename "$(find dist -maxdepth 1 -name '*.tgz' | head -1)")
          HASHES=$(
            (cd dist && sha256sum "$TARBALL") && \
            sha256sum sbom.cdx.json
          )
          echo "[subjects] release artifact hashes:"
          echo "$HASHES"
          HASHES_B64=$(echo "$HASHES" | base64 -w0)
          echo "hashes=$HASHES_B64" >> "$GITHUB_OUTPUT"

      - name: Upload publish bundle (tarball + SBOM + CHANGELOG)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: publish-bundle
          path: |
            dist/*.tgz
            sbom.cdx.json
            package.json
            CHANGELOG.md
          if-no-files-found: error
          retention-days: 1

  publish-and-release:
    name: Create release + publish to npm
    needs: validate
    # Publishes on a v* tag push, or on an explicit dispatch with
    # dry_run=false. The dispatch path verifies below that the commit the
    # whole run built from is exactly what the version's pushed tag points
    # at, so a dispatch can never publish bytes no tag vouches for.
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && needs.validate.outputs.is_tag == 'true') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false) }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write    # gh release create + asset attach
      id-token: write    # OIDC token for npm --provenance
    timeout-minutes: 15
    steps:
      - name: Verify the built commit is the version's tagged commit
        # No checkout in this job -- the artifact hashes bind the bundle to
        # github.sha, and this binds github.sha to the pushed tag. Tag
        # pushes satisfy it trivially; the dispatch path is what it is for.
        # ls-remote works repo-less; the ^{} row is the peeled commit of an
        # annotated tag, with a fallback for a lightweight one.
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          REPO_URL: https://github.com/${{ github.repository }}
          BUILT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG_SHA=$(git ls-remote "$REPO_URL" "refs/tags/v${VERSION}^{}" | cut -f1)
          if [ -z "$TAG_SHA" ]; then
            TAG_SHA=$(git ls-remote "$REPO_URL" "refs/tags/v${VERSION}" | cut -f1)
          fi
          if [ -z "$TAG_SHA" ]; then
            echo "::error::No pushed tag v${VERSION} -- push the signed tag before dispatching a publish."
            exit 1
          fi
          if [ "$TAG_SHA" != "$BUILT_SHA" ]; then
            echo "::error::This run built $BUILT_SHA but tag v${VERSION} points at $TAG_SHA."
            exit 1
          fi
          echo "[tag-verify] built commit == v${VERSION} ($TAG_SHA)"

      - name: Set up Node 24.18.0 LTS + npm registry auth
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24.18.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Download publish bundle (tarball + SBOM + CHANGELOG)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: publish-bundle

      - name: Verify downloaded artifacts against the validate-job hashes
        # The publish bundle travels through the actions artifact store
        # between jobs. Recompute the sha256 of the tarball + SBOM with the
        # exact commands the validate job used and require byte-identical
        # output -- a divergence means the bytes about to be published are
        # NOT the bytes the gates validated, and the publish must not
        # proceed. (The .sha256 release sidecar is derived from the
        # downloaded tarball further down; this check is what entitles it
        # to be.)
        env:
          HASHES_B64: ${{ needs.validate.outputs.hashes }}
        run: |
          set -euo pipefail
          EXPECTED=$(echo "$HASHES_B64" | base64 -d)
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          ACTUAL=$(
            (cd dist && sha256sum "$(basename "$TARBALL")") && \
            sha256sum sbom.cdx.json
          )
          if [ -z "$EXPECTED" ] || [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Downloaded artifacts do not match the hashes the validate job computed."
            echo "validated subjects:"
            echo "$EXPECTED"
            echo "downloaded artifacts:"
            echo "$ACTUAL"
            exit 1
          fi
          echo "[subject-verify] tarball + SBOM match the validated hashes"

      - name: Verify NPM_TOKEN is reachable
        # Fail loud + early if the NPM_TOKEN secret isn't visible to this
        # workflow run. The publish step otherwise produces an opaque
        # ENEEDAUTH after ~60s of npm registry churn.
        env:
          NPM_TOKEN_REACHABLE: ${{ secrets.NPM_TOKEN != '' }}
        run: |
          if [ "$NPM_TOKEN_REACHABLE" != "true" ]; then
            echo "::error::NPM_TOKEN secret is empty in this workflow run."
            echo "::error::Confirm a secret named NPM_TOKEN exists in the npm-publish environment"
            echo "::error::and that the environment's deployment-branch policy includes this tag."
            exit 1
          fi
          echo "NPM_TOKEN secret is reachable."

      - name: Release-digest sidecar (SHA-256)
        # Conventional checksum operators expect on a release page; verify
        # with `sha256sum -c`. Written in `<sha>  <filename>` format.
        run: |
          set -euo pipefail
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          ( cd "$(dirname "$TARBALL")" && sha256sum "$(basename "$TARBALL")" > "$(basename "$TARBALL").sha256" )
          cat "${TARBALL}.sha256"

      - name: Extract release notes from CHANGELOG
        # Single source of truth: the CHANGELOG.md section whose header is
        # `## X.Y.Z` (the generator's grammar; a leading v is tolerated).
        # The header's version token is compared to the requested version by
        # exact string equality -- the version is never interpolated into a
        # regex, so no character in it can widen or shift the match. (awk -v
        # would also reprocess backslash escapes in the value, silently
        # undoing any escaping; ENVIRON delivers the bytes untouched.) awk
        # prints lines from the matching header up to (not including) the
        # next `## ` header, and writes the matched header aside so the
        # shell can independently assert it names the literal requested
        # version before the notes are allowed near a release.
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          rm -f release-notes-header.txt
          awk '
            /^## / {
              if (grab) exit
              v = $2
              sub(/^v/, "", v)
              if (v == ENVIRON["VERSION"]) { grab = 1; print > "release-notes-header.txt"; next }
            }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          HEADER=""
          if [ -f release-notes-header.txt ]; then HEADER=$(head -n 1 release-notes-header.txt); fi
          case "$HEADER" in
            "## ${VERSION}"|"## ${VERSION} "*|"## v${VERSION}"|"## v${VERSION} "*) ;;
            *)
              echo "::error::CHANGELOG.md has no '## ${VERSION}' section header -- refusing to publish notes for a different version."
              exit 1
              ;;
          esac
          BYTE_COUNT=$(wc -c < release-notes.md | tr -d ' ')
          if [ "$BYTE_COUNT" -lt 16 ]; then
            echo "::error::The CHANGELOG.md section for v${VERSION} is empty (got ${BYTE_COUNT} bytes)."
            exit 1
          fi
          echo "[release-notes] extracted ${BYTE_COUNT} bytes for v${VERSION}"

      - name: Create release with ALL assets atomically
        # The workflow is authoritative for release creation. We refuse to
        # overwrite an existing release -- if one exists for this tag,
        # that's an integrity signal (a duplicate run, or a manual
        # create). Fail loud.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      v${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. The workflow is authoritative for release creation."
            echo "::error::Delete it with 'gh release delete $TAG' and re-run, OR push a new tag."
            exit 1
          fi
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          ASSETS=(
            "$TARBALL"
            "${TARBALL}.sha256"
            sbom.cdx.json
          )
          echo "[release-create] assets: $TARBALL + .sha256 + SBOM"
          gh release create "$TAG" \
            "${ASSETS[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release-notes.md
          echo "[release-create] release $TAG created with full asset bundle"

      - name: Publish to npm (with provenance)
        # `npm publish <tarball>` publishes the EXACT bytes the validate
        # job packed and hashed. Provenance is generated against this
        # workflow run's context. The leading `./` is load-bearing --
        # without it npm 10+ mis-classifies a relative path containing `/`
        # as a git spec.
        run: |
          set -euo pipefail
          TARBALL=$(find dist -maxdepth 1 -name '*.tgz' | head -1)
          echo "Publishing: $TARBALL"
          npm publish "./${TARBALL}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  summary:
    name: Build summary
    needs: [validate, publish-and-release]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Render outcome table
        env:
          IS_TAG:          ${{ needs.validate.outputs.is_tag || 'false' }}
          VERSION:         ${{ needs.validate.outputs.version || 'unknown' }}
          DRY_RUN:         ${{ inputs.dry_run || 'false' }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          PUBLISH_RESULT:  ${{ needs.publish-and-release.result }}
        run: |
          {
            echo "### npm publish"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Package**          | \`@blamejs/stash\` |"
            echo "| **Version**          | \`${VERSION}\` |"
            echo "| **Tag ref**          | ${IS_TAG} |"
            echo "| **Dry run**          | ${DRY_RUN} |"
            echo "| **Validate job**     | ${VALIDATE_RESULT} |"
            echo "| **Publish + release**| ${PUBLISH_RESULT} |"
            echo "| **Registry**         | https://registry.npmjs.org |"
            if [ "$IS_TAG" = "true" ] && [ "$DRY_RUN" != "true" ] && [ "$PUBLISH_RESULT" = "success" ]; then
              echo "| **Provenance (npm)** | https://www.npmjs.com/package/@blamejs/stash/v/${VERSION} -> Provenance tab |"
              echo "| **GitHub release**   | https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${VERSION} |"
            fi
            echo ""
            echo "Operators can install with:"
            echo ""
            echo '```bash'
            echo "npm install @blamejs/stash@${VERSION}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
