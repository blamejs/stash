# GH Actions workflow lint gate. Three tools, three layers:
#
#   - pinact     -- refuses any `uses:` reference that isn't pinned to a
#                   40-char SHA + has a tag-shaped version comment. The
#                   version comment must match the registered tag for that
#                   SHA at refresh time. Defense against the
#                   CVE-2025-30066 class (`tj-actions/changed-files`
#                   retroactive tag rewrite, 23,000+ affected repos,
#                   March 2025). Exceptions are documented in .pinact.yaml.
#   - zizmor     -- workflow-security audit. Catches template-injection,
#                   excessive-permissions, dangerous-triggers, unpinned-
#                   uses, cache-poisoning, ref-confusion, impostor-commit,
#                   unredacted-secrets, and ~10 other classes.
#   - actionlint -- syntax + expression validation + shellcheck on every
#                   `run:` block.
#
# All three are necessary; none subsume the others.

name: actions lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.pinact.yaml'
      - '.github/zizmor.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: actions-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pinact:
    name: pinact -- SHA + version-comment integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install pinact (release binary + sha256 verify)
        # Install pinact directly from the upstream release binary instead
        # of via the pinact-action wrapper. The wrapper is designed for
        # auto-fix-and-commit flow; this gate wants check-only behavior
        # with full control over exit semantics.
        env:
          PINACT_VERSION: v3.10.1
        run: |
          set -euo pipefail
          V="${PINACT_VERSION#v}"
          curl -fsSLo /tmp/pinact.tar.gz "https://github.com/suzuki-shunsuke/pinact/releases/download/${PINACT_VERSION}/pinact_linux_amd64.tar.gz"
          curl -fsSLo /tmp/pinact-checksums.txt "https://github.com/suzuki-shunsuke/pinact/releases/download/${PINACT_VERSION}/pinact_${V}_checksums.txt"
          # Verify the downloaded tarball against the upstream-published
          # checksum line. If the upstream tarball was retroactively
          # rewritten, this fails closed -- the workflow refuses rather than
          # running an unverified binary.
          # Exact filename equality on the checksum line -- a regex here
          # would let its metacharacters match other artifact names.
          ACTUAL=$(sha256sum /tmp/pinact.tar.gz | awk '{print $1}')
          EXPECTED=$(awk '$2 == "pinact_linux_amd64.tar.gz" {print $1}' /tmp/pinact-checksums.txt)
          if [ -z "$EXPECTED" ]; then
            echo "::error::could not find pinact_linux_amd64.tar.gz line in upstream checksums"
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::pinact tarball sha256 ${ACTUAL} does not match upstream-published ${EXPECTED}"
            exit 1
          fi
          mkdir -p /tmp/pinact-bin
          tar -xzf /tmp/pinact.tar.gz -C /tmp/pinact-bin
          sudo install -m 0755 /tmp/pinact-bin/pinact /usr/local/bin/pinact
          pinact --version

      - name: pinact run --check (refuses any tag-shaped `uses:` reference)
        # `--check` exits nonzero if any `uses:` reference is tag-pinned
        # rather than SHA-pinned, honoring the .pinact.yaml exceptions.
        # This is the structural defense against the CVE-2025-30066
        # retroactive-tag-rewrite class.
        run: |
          set -euo pipefail
          pinact run --check

      - name: pinact run --verify (refuses version-comment / SHA mismatch)
        # `--verify` re-resolves each pinned SHA's registered tag at check
        # time and refuses if the version comment in the workflow
        # disagrees. Catches the case where an action's tag was rewritten
        # AFTER the workflow was pinned. Composing with `--check` keeps the
        # gate in refuse-mode (no auto-rewrite).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pinact run --verify --check

  zizmor:
    name: zizmor -- workflow security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install zizmor (release binary + sha256 verify)
        # Direct release-binary install instead of astral-sh/setup-uv +
        # uvx: a third-party setup action can startup_failure the whole
        # workflow before any job runs. A run: step cannot. zizmor
        # publishes no checksums file, so the expected sha256 is pinned
        # inline; a mismatch fails closed.
        env:
          ZIZMOR_VERSION: v1.18.0
          ZIZMOR_SHA256:  8e7901319ab7b71c38d6d388a48e02ff65791e5971b2ee6577c9b5c3ab44c65f
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/zizmor.tar.gz "https://github.com/zizmorcore/zizmor/releases/download/${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz"
          ACTUAL=$(sha256sum /tmp/zizmor.tar.gz | awk '{print $1}')
          if [ "$ACTUAL" != "$ZIZMOR_SHA256" ]; then
            echo "::error::zizmor tarball sha256 ${ACTUAL} does not match pinned ${ZIZMOR_SHA256}"
            exit 1
          fi
          mkdir -p /tmp/zizmor-bin
          tar -xzf /tmp/zizmor.tar.gz -C /tmp/zizmor-bin ./zizmor
          sudo install -m 0755 /tmp/zizmor-bin/zizmor /usr/local/bin/zizmor
          zizmor --version

      - name: Run zizmor (fail on level=low across every rule class)
        # Pure run-gate: zizmor exits non-zero on any finding, failing the
        # job. Inline `# zizmor: ignore[<rule>] -- <reason>` is the
        # suppression mechanism for reviewed exceptions; config-file
        # suppressions live in .github/zizmor.yml.
        run: |
          set -euo pipefail
          zizmor --min-severity low --no-progress .github/workflows/

  actionlint:
    name: actionlint -- YAML + expression + shellcheck on `run:` blocks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install actionlint (release binary + sha256 verify)
        # Direct release-binary install instead of the raven-actions
        # composite: the composite can startup_failure on the runner,
        # taking the whole workflow down before any job runs. The binary
        # path also drops the composite's transitive action surface, which
        # fits a gate whose purpose is pinning discipline. Mirrors the
        # pinact install step above.
        env:
          ACTIONLINT_VERSION: v1.7.12
        run: |
          set -euo pipefail
          V="${ACTIONLINT_VERSION#v}"
          curl -fsSLo /tmp/actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${V}_linux_amd64.tar.gz"
          curl -fsSLo /tmp/actionlint-checksums.txt "https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${V}_checksums.txt"
          # Exact filename equality on the checksum line -- interpolating
          # the version into a regex would let its dots match any character
          # and select another artifact's hash.
          ACTUAL=$(sha256sum /tmp/actionlint.tar.gz | awk '{print $1}')
          EXPECTED=$(awk -v f="actionlint_${V}_linux_amd64.tar.gz" '$2 == f {print $1}' /tmp/actionlint-checksums.txt)
          if [ -z "$EXPECTED" ]; then
            echo "::error::could not find actionlint_${V}_linux_amd64.tar.gz line in upstream checksums"
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::actionlint tarball sha256 ${ACTUAL} does not match upstream-published ${EXPECTED}"
            exit 1
          fi
          mkdir -p /tmp/actionlint-bin
          tar -xzf /tmp/actionlint.tar.gz -C /tmp/actionlint-bin actionlint
          sudo install -m 0755 /tmp/actionlint-bin/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Run actionlint (+ shellcheck on every run block)
        # shellcheck ships preinstalled on ubuntu-latest; actionlint
        # invokes it automatically on each `run:` block. Non-zero exit on
        # any finding keeps this a hard gate.
        run: |
          set -euo pipefail
          actionlint -color
