# Build, scan with Trivy, sign with cosign, then push the stashjs.com docs
# container to GHCR on every `v*` tag. Order: lint -> build -> scan -> push ->
# sign -> smoke, so a vulnerable image never lands in the registry and a
# published image is always cosign-signed and post-publish smoke-tested.
#
# Two Trivy steps:
#   1. Visibility (exit 0): scans every severity + secrets + misconfig,
#      including unfixed CVEs -- informational, for the next patch's fix log.
#   2. Gate (exit 1): fails the release on CRITICAL/HIGH with a fix
#      available (`ignore-unfixed: true`).
#
# `workflow_dispatch.dry_run` exercises build + scan without pushing.

name: Release container

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and scan without pushing to registry or signing'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-container-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/stash-wiki

jobs:
  suite:
    name: Full gates + suite (static, runtime, sandboxed, wiki e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node 24.18.0 LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24.18.0'
      - name: Run the full smoke pipeline (zero dependencies, plain node)
        run: npm run smoke
      - name: Run the wiki e2e (the site this image serves)
        run: npm run wiki:e2e

  lint-hadolint:
    name: Hadolint (Dockerfiles)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Run Hadolint (strict, all severities)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: examples/wiki/Dockerfile
          config:     .hadolint.yaml
          format:     tty
          no-fail:    false
          failure-threshold: warning

  lint-shellcheck:
    name: ShellCheck (shell scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Detect shell scripts
        id: sh
        run: |
          count=$(git ls-files '*.sh' | wc -l)
          echo "Tracked .sh files: $count"
          git ls-files '*.sh' || true
          echo "found=$count" >> "$GITHUB_OUTPUT"
      - name: Run ShellCheck
        if: steps.sh.outputs.found != '0'
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: style
          format:   tty
          check_together: 'yes'

  publish:
    name: Build, scan, publish
    needs: [suite, lint-hadolint, lint-shellcheck]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write   # GHCR multi-arch push
      id-token: write   # cosign keyless signing via GitHub OIDC
    outputs:
      digest:  ${{ steps.push.outputs.digest }}
      version: ${{ steps.tags.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GHCR
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          if [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            REF="${GITHUB_REF#refs/tags/v}"
            MAJOR_MINOR="${REF%.*}"
            {
              echo "semver=$REF"
              echo "minor=$MAJOR_MINOR"
              echo "scan_tag=$REF"
              echo "is_tag=true"
            } >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            {
              echo "semver=0.0.0-dev-${SHORT_SHA}"
              echo "minor=0.0"
              echo "scan_tag=dev-${SHORT_SHA}"
              echo "is_tag=false"
            } >> "$GITHUB_OUTPUT"
          fi

      # Resolve the rolling Chainguard base tag to a concrete digest ONCE
      # and feed it to both the local Trivy build and the multi-arch push
      # via a build-arg, so the scanned image is the published one and
      # always carries current CVE patches -- without committing a pin that
      # goes stale and trips the release gate.
      - name: Resolve base image digest (scan == publish)
        id: bases
        run: |
          set -euo pipefail
          runtime=$(docker buildx imagetools inspect cgr.dev/chainguard/node:latest --format '{{.Manifest.Digest}}')
          # Fail closed on a missing / malformed digest -- an empty or garbage
          # value would otherwise flow into the build-arg and silently produce an
          # unpinned base, so the scanned image would not equal the published one.
          if ! printf '%s' "$runtime" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::could not resolve a valid sha256 digest for the runtime base (got '${runtime}')"
            exit 1
          fi
          echo "runtime=cgr.dev/chainguard/node:latest@${runtime}" >> "$GITHUB_OUTPUT"
          echo "Resolved runtime=${runtime}"

      - name: Build (local-only, for Trivy)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: examples/wiki/Dockerfile
          build-args: |
            BASE_RUNTIME=${{ steps.bases.outputs.runtime }}
          load: true
          push: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.tags.outputs.scan_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan -- visibility (all severities, no fail)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.tags.outputs.scan_tag }}
          severity:  'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          exit-code: '0'
          scanners:  'vuln,secret,misconfig'
          ignore-unfixed: false
          format:    'table'

      - name: Trivy scan -- release gate (CRITICAL/HIGH fixed)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref:      ${{ env.IMAGE }}:${{ steps.tags.outputs.scan_tag }}
          severity:       'CRITICAL,HIGH'
          exit-code:      '1'
          ignore-unfixed: true
          format:         'table'

      - name: Install cosign
        if: ${{ !inputs.dry_run && steps.tags.outputs.is_tag == 'true' }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Push (multi-arch, after Trivy gate)
        id: push
        if: ${{ !inputs.dry_run && steps.tags.outputs.is_tag == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: examples/wiki/Dockerfile
          build-args: |
            BASE_RUNTIME=${{ steps.bases.outputs.runtime }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tags.outputs.semver }}
            ${{ env.IMAGE }}:${{ steps.tags.outputs.minor }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.title=blamejs-stash-wiki
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tags.outputs.semver }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=stashjs.com documentation site
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign (keyless, GitHub OIDC)
        if: ${{ !inputs.dry_run && steps.tags.outputs.is_tag == 'true' && steps.push.outputs.digest }}
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Build summary
        if: always()
        env:
          DRY_RUN:   ${{ inputs.dry_run || 'false' }}
          IS_TAG:    ${{ steps.tags.outputs.is_tag }}
          VERSION:   ${{ steps.tags.outputs.semver }}
        run: |
          {
            echo "### Container release"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version**   | ${VERSION} |"
            echo "| **Platforms** | linux/amd64, linux/arm64 |"
            echo "| **Registry**  | ${IMAGE} |"
            echo "| **Commit**    | ${GITHUB_SHA} |"
            echo "| **Dry run**   | ${DRY_RUN} |"
            echo "| **Tag push**  | ${IS_TAG} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---- Post-publish smoke test --------------------------------------------
  # Pulls the just-published image by digest, verifies the OCI labels, starts
  # the container hardened (--init, no-new-privileges, cap-drop ALL), curls
  # /healthz on port 3011 and asserts the body contains "status":"ok".
  smoke-test:
    name: Post-publish smoke test
    needs: publish
    if: ${{ !inputs.dry_run && needs.publish.outputs.digest != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DIGEST: ${{ needs.publish.outputs.digest }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: docker pull "${IMAGE}@${DIGEST}"

      - name: Verify OCI labels
        run: |
          set -euo pipefail
          LABELS=$(docker inspect "${IMAGE}@${DIGEST}" --format '{{json .Config.Labels}}')
          echo "$LABELS" | python3 -m json.tool
          echo "$LABELS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin) or {}
          required = [
            'org.opencontainers.image.title',
            'org.opencontainers.image.source',
            'org.opencontainers.image.licenses',
            'org.opencontainers.image.version',
          ]
          missing = [k for k in required if k not in d]
          assert not missing, 'missing labels: ' + ', '.join(missing)
          print('Labels OK: title=' + d['org.opencontainers.image.title'] + ', version=' + d['org.opencontainers.image.version'])
          "

      - name: Start container
        run: |
          docker run -d --name smoke-test \
            --init \
            --security-opt no-new-privileges:true \
            --cap-drop ALL \
            -p 3011:3011 \
            "${IMAGE}@${DIGEST}"

          echo "Waiting for /healthz..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3011/healthz > /dev/null 2>&1; then
              echo "Healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Health check
        run: |
          set -euo pipefail
          HEALTH=$(curl -sf http://localhost:3011/healthz)
          echo "$HEALTH"
          echo "$HEALTH" | python3 -c "
          import sys, json
          d = json.loads(sys.stdin.read())
          assert d.get('status') == 'ok', 'unhealthy: ' + json.dumps(d)
          "

      - name: Capture container diagnostics on failure
        if: failure()
        run: |
          echo "=== docker ps ==="
          docker ps -a --filter name=smoke-test
          echo "=== docker logs ==="
          docker logs smoke-test 2>&1 || echo "  (container gone)"

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-test 2>/dev/null || true
